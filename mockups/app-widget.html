<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>OVRFLO — Widget UI</title>
<link href='https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap' rel='stylesheet'>
<link rel='stylesheet' href='styles.css'>
<style>
  .w-full { width: 100%; }
  .text-center { text-align: center; }
  .p-4 { padding: 16px; }
  .p-6 { padding: 24px; }
  .rounded { border-radius: 12px; }
  .bg-surface2 { background: var(--surface2); }
  .border-divider { border: 1px solid var(--divider); }
  .input-huge { background: transparent; border: none; font-size: 32px; padding: 0; outline: none; color: var(--white); }
  .input-huge::placeholder { color: var(--secondary); }
</style>
</head>
<body>
<nav class='nav'>
  <div class='container nav-inner'>
    <div class='brand'>OVRF<span>LO</span> <span class='text-xs text-secondary ml-2'>WIDGET UI</span></div>
    <div class='nav-links'>
      <a href='landing-v2.html' class='text-secondary'>&larr; Back to Landing</a>
    </div>
  </div>
</nav>

<section class='py-12'>
  <div class='container flex flex-col items-center'>
    
    <div class='flex gap-2 mb-8'>
       <a href='app-tables.html' class='btn btn-outline btn-sm'>Tables UI</a>
       <a href='app-split.html' class='btn btn-outline btn-sm'>Split-Pane UI</a>
       <a href='app-widget.html' class='btn btn-outline btn-sm active' style='border-color:var(--cyan); color:var(--cyan)'>Widget UI</a>
    </div>

    <!-- Swap-style Widget -->
    <div class='card p-0' style='width:100%; max-width:440px; overflow:hidden;'>
      <div class='flex p-4 border-b border-divider' style='border-bottom: 1px solid var(--divider)'>
         <div class='role-toggle w-full flex'>
           <button class='active' style='flex:1; border-radius:6px;'>Borrow</button>
           <button style='flex:1; border-radius:6px;'>Supply</button>
         </div>
      </div>
      
      <div class='p-6'>
        <!-- Market Select -->
        <select class='w-full mb-2 p-4 rounded bg-surface2 border-divider text-white cursor-pointer' style='font-weight:500; font-size:16px;'>
          <option>Market: PT-wstETH-27JUN27</option>
          <option>Market: PT-wstETH-25DEC26</option>
        </select>
        <div class='text-right text-xs text-cyan mb-6'>Borrow APY: 4.62%</div>

        <!-- Input Box -->
        <div class='p-4 rounded bg-surface2 border-divider mb-2'>
           <div class='text-sm text-secondary mb-2'>You deposit</div>
           <div class='flex justify-between items-center'>
             <input type='number' placeholder='0.0' class='mono input-huge w-full'>
             <span class='font-medium text-lg ml-2'>PT</span>
           </div>
           <div class='text-xs text-secondary text-right mt-2 cursor-pointer hover:text-white'>Balance: 95.0 PT</div>
        </div>

        <div class='flex justify-center my-2'><span style='color:var(--secondary); font-size:18px;'>&darr;</span></div>

        <!-- Output Box -->
        <div class='p-4 rounded border-divider mb-6' style='background:rgba(93,192,245,.05); border-color:rgba(93,192,245,.3)'>
           <div class='text-sm text-cyan mb-2'>You receive instantly</div>
           <div class='flex justify-between items-center'>
             <input type='number' placeholder='0.0' readonly class='mono input-huge w-full text-cyan'>
             <span class='font-medium text-lg ml-2 text-cyan'>wstETH</span>
           </div>
           <div class='flex justify-between text-xs text-secondary mt-4'>
             <span>Obligation at maturity:</span>
             <span class='mono'>0.00 ovrfloETH</span>
           </div>
        </div>

        <button class='btn btn-primary w-full py-4 text-lg' style='padding:16px'>Borrow wstETH</button>
      </div>
    </div>

    <!-- Mini Positions -->
    <div class='mt-8' style='width:100%; max-width:440px;'>
      <div class='flex justify-between items-center mb-4'>
        <span class='font-medium text-secondary'>Your Active Borrows</span>
      </div>
      <div class='card p-4 flex justify-between items-center'>
         <div>
           <div class='font-medium'>PT-wstETH-27JUN27</div>
           <div class='text-xs text-secondary mt-1'>Obligation: 47.10 ovrfloETH</div>
         </div>
         <div class='text-right'>
           <div class='mono text-cyan'>45.00 wstETH</div>
           <button class='btn btn-outline btn-sm mt-2'>Manage</button>
         </div>
      </div>
    </div>

  </div>
</section>
</body>
</html>
